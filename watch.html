<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watch — Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100">
    <script>
        // Protect the page: redirect to login if not authenticated
        if (localStorage.getItem('authenticated') !== 'true') {
            location.href = 'index.html';
        }
    </script>

    <header class="bg-white shadow">
        <div class="max-w-4xl mx-auto py-4 px-6 flex items-center justify-between">
            <h1 class="text-lg font-semibold">Watch Page</h1>
            <button id="logoutBtn" class="text-sm text-indigo-600 hover:underline">Logout</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <section class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-medium mb-2">Protected content</h2>
            <p class="text-gray-600 mb-4">You reached the watch page because you entered the correct password.</p>

            <div class="aspect-video bg-black rounded overflow-hidden flex items-center justify-center text-white">
                <iframe src="https://drive.google.com/file/d/1yz7Gtye3nnfmt1OdS7haT_Es9-NE8OvT/preview" width="720" height="480"
                    allow="autoplay">
                </iframe>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
