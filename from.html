<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>From</title>
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-green-400 to-green-500 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-md p-8">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
                Login Form
            </h1>
            
            <div class="space-y-6">
                <div>
                    <label for="username" class="block text-gray-700 font-semibold mb-2">Username:</label>
                    <input type="text" name="username" id="username" placeholder="Enter your username" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition">
                </div>
                
                <div>
                    <label for="password" class="block text-gray-700 font-semibold mb-2">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition">
                </div>
                
                <button class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    Login
                </button>
            </div>
        </div>
    </div>
</body>
</html>
