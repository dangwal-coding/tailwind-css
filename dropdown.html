<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dropdown with Tailwind CSS</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <h1 class="headline">Dropdown with Tailwind CSS</h1>
    <div class="m-10 relative inline-block group">
        <div class="bg-amber-400 p-2 rounded w-fit inline-block cursor-pointer">fruits</div>
        <div class="hidden group-hover:block bg-amber-400 p-2 rounded mt-2 w-fit absolute">
            <ul>
                <li>apple</li>
                <li>banana</li>
                <li>orange</li>
            </ul>
        </div>
    </div>
</body>
</html>
