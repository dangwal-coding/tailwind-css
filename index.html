<!doctype html>
<html lang="en">
  <head>
    <title>Login — Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-linear-to-r from-sky-500 to-indigo-600 flex items-center justify-center">
    <main class="w-full max-w-md p-6 bg-white/90 rounded-xl shadow-lg backdrop-blur-sm">
      <h1 class="text-2xl font-semibold text-center text-gray-800 mb-4">Welcome back</h1>
      <p class="text-sm text-center text-gray-600 mb-6">Please sign in to continue to the watch page.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full px-4 py-2 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div class="flex items-center justify-between">
          <div class="text-sm text-gray-600">Use your password to sign in.</div>
        </div>

        <div>
          <button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Sign in</button>
        </div>

        <p id="errorMsg" class="text-sm text-red-600 text-center hidden"></p>
      </form>

      <footer class="mt-6 text-xs text-center text-gray-500">
        Tip: Password is set in app.js (change CORRECT_PASSWORD).
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
